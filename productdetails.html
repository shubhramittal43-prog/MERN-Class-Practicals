<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <link rel="stylesheet" href="product.css">
</head>
<body>

<div class="container">

    <h1>Product Details System</h1>

    <button onclick="displayProducts()">
        Add Products
    </button>

    <div id="output"></div>

</div>

<script>

function displayProducts(){

    let table = `
    <table>
        <tr>
            <th>Image</th>
            <th>Product ID</th>
            <th>Product Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Total Amount</th>
        </tr>
    `;

    for(let i=1;i<=5;i++)
    {
        let img = prompt("Enter Product Image URL");
        let pname = prompt("Enter Product Name");
        let qty = parseInt(prompt("Enter Quantity"));

        let pid = 100 + i;
        let price = 500;   // Fixed Price

        let total = price * qty;

        table += `
        <tr>
            <td>
                <img src="${img}" alt="Product">
            </td>
            <td>${pid}</td>
            <td>${pname}</td>
            <td>₹${price}</td>
            <td>${qty}</td>
            <td>₹${total}</td>
        </tr>
        `;
    }

    table += "</table>";

    document.getElementById("output").innerHTML = table;
}

</script>

</body>
</html>
