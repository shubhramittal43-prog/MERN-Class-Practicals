<!DOCTYPE html>
<html>
<head>
    <title>REGISTRATION FORM</title>
    <link rel="stylesheet" href="style.css"
</head>
<body>
    <div class="container">
        <form>
            <table>
                <tr>
                    <td>First Name</td>
                    <td>
                        <input type="text"placeholder="Your First Name Here"
                    </td>
            </tr>
            <tr>
                <td>Last Name</td>
                    <td>
                        <input type="text"placeholder="Your Last Name Here"
                    </td>
            </tr>
            <tr>
                <td>Email Id</td>
                    <td>
                        <input type="email"placeholder="Enter your email"
                    </td>
            </tr>
            <tr>
                <td>Password</td>
                    <td>
                        <input type="password"placeholder="Enter your Password"
                    </td>
            </tr>
            <tr>
                <td>Gender</td>
                <td>
                    Male<input type="radio" name="gender">
                    Female<input type="radio" name="gender">
                </td>
            </tr>
            <tr>
                <td>Highest Qualification</td>
                <td>
                    10th<input type="radio" name="Qualification">
                    12th<input type="radio" name="Qualification">
                    BCA<input type="radio" name="Qualification">
                </td>
            </tr>
            <tr>
                <td>Skills</td>
                <td>
                    HTML <input type="checkbox">
                    CSS <input type="checkbox">
                    JS <input type="checkbox">
                </td>
            </tr>
            <tr>
                <td>City</td>
                <td>
                    <select>
                        <option>----SELECT YOUR CITY-----</option>
                        <option>Delhi</option>
                        <option>Noida</option>
                        <option>Meerut</option>
                        <option>Gurugram</option>
                        <option>Haridwar</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Date</td>
                <td>
                    <input type="date">
                </td>
            </tr>
            <tr>
                <td>Select Range</td>
                <td>
                    <input type="range">
                </td>
            </tr>
            <tr>
                <td><input type="submit" value="submit"></td>
                <td>
                    <input type="reset" value="reset">
                </td>
            </tr>
            
            </table>
        </form>
    </div>
</body>
</html>
