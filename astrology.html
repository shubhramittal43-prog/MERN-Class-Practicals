<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Astrology Zodiac Finder</title>
    <link rel="stylesheet" href="astrology.css">
</head>
<body>

<div class="container">
    <h1>🌟 Zodiac Sign Finder 🌟</h1>

    <label>Enter Date</label>
    <input type="number" id="date" placeholder="Date (1-31)">

    <label>Enter Month</label>
    <input type="number" id="month" placeholder="Month (1-12)">

    <button onclick="findZodiac()">Find Zodiac</button>

    <div id="result"></div>

    <img id="zodiacImage" src="" alt="">
</div>

<script>

function findZodiac(){

    let date = parseInt(prompt("Enter Date (1-31):"));
    let month = prompt("Enter Month (January-December):").toLowerCase();

    let zodiac = "";
    let image = "";

    if((month=="march" && date>=21) || (month=="april" && date<=19)){
        zodiac="Aries";
        image="images/aries.png";
    }

    else if((month=="april" && date>=20) || (month=="may" && date<=20)){
        zodiac="Taurus";
        image="images/taurus.png";
    }

    else if((month=="may" && date>=21) || (month=="june" && date<=20)){
        zodiac="Gemini";
        image="images/gemini.png";
    }

    else if((month=="june" && date>=21) || (month=="july" && date<=22)){
        zodiac="Cancer";
        image="images/cancer.png";
    }

    else if((month=="july" && date>=23) || (month=="august" && date<=22)){
        zodiac="Leo";
        image="images/leo.png";
    }

    else if((month=="august" && date>=23) || (month=="september" && date<=22)){
        zodiac="Virgo";
        image="images/virgo.png";
    }

    else if((month=="september" && date>=23) || (month=="october" && date<=22)){
        zodiac="Libra";
        image="images/libra.png";
    }

    else if((month=="october" && date>=23) || (month=="november" && date<=21)){
        zodiac="Scorpio";
        image="images/scorpio.png";
    }

    else if((month=="november" && date>=22) || (month=="december" && date<=21)){
        zodiac="Sagittarius";
        image="images/sagittarius.png";
    }

    else if((month=="december" && date>=22) || (month=="january" && date<=19)){
        zodiac="Capricorn";
        image="images/capricorn.png";
    }

    else if((month=="january" && date>=20) || (month=="february" && date<=18)){
        zodiac="Aquarius";
        image="images/aquarius.png";
    }

    else if((month=="february" && date>=19) || (month=="march" && date<=20)){
        zodiac="Pisces";
        image="images/pisces.png";
    }

    else{
        zodiac="Invalid Date or Month";
        image="";
    }

    document.getElementById("result").innerHTML =
    "<h2>Your Zodiac Sign is: " + zodiac + "</h2>";

    if(image!=""){
        document.getElementById("zodiacImage").src=image;
        document.getElementById("zodiacImage").style.display="block";
    }
    else{
        document.getElementById("zodiacImage").style.display="none";
    }
}

findZodiac();

</script>
    

</body>
</html>
