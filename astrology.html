<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Astrology Zodiac Finder</title>
    <link rel="stylesheet" href="astrology.css">
</head>
<body>

<div class="container">
    <h1>🌟 Zodiac Sign Finder 🌟</h1>

    <label>Enter Date</label>
    <input type="number" id="date" placeholder="Date (1-31)">

    <label>Enter Month</label>
    <input type="number" id="month" placeholder="Month (1-12)">

    <button onclick="findZodiac()">Find Zodiac</button>

    <div id="result"></div>

    <img id="zodiacImage" src="" alt="">
</div>

<script>

function findZodiac(){

    let date = parseInt(document.getElementById("date").value);
    let month = parseInt(document.getElementById("month").value);

    let zodiac = "";
    let image = "";

    if(month==3 && date>=21 || month==4 && date<=19){
        zodiac="Aries";
        image="https://i.pinimg.com/1200x/a9/2c/16/a92c16c05c49419746d4338cbc2e1654.jpg";
    }

    else if(month==4 && date>=20 || month==5 && date<=20){
        zodiac="Taurus";
        image="https://i.pinimg.com/736x/41/65/1c/41651cf7ff554685b34ebc58c2b39674.jpg";
    }

    else if(month==5 && date>=21 || month==6 && date<=20){
        zodiac="Gemini";
        image="https://i.pinimg.com/1200x/17/67/64/17676489f60481a4644c10646b03c614.jpg";
    }

    else if(month==6 && date>=21 || month==7 && date<=22){
        zodiac="Cancer";
        image="https://i.pinimg.com/736x/5f/c2/e2/5fc2e2956fa888807abd0463327ceb29.jpg";
    }

    else if(month==7 && date>=23 || month==8 && date<=22){
        zodiac="Leo";
        image="https://i.pinimg.com/736x/1c/91/e2/1c91e2428b1dc5f94efd338dadadbf71.jpg";
    }

    else if(month==8 && date>=23 || month==9 && date<=22){
        zodiac="Virgo";
        image="https://i.pinimg.com/736x/14/00/cf/1400cf13d86b3ad9fb8069bbcddb92a0.jpg";
    }

    else if(month==9 && date>=23 || month==10 && date<=22){
        zodiac="Libra";
        image="https://i.pinimg.com/736x/25/69/d1/2569d1c7a2d9e04744fb1ff5832911e6.jpg";
    }

    else if(month==10 && date>=23 || month==11 && date<=21){
        zodiac="Scorpio";
        image="https://i.pinimg.com/736x/9a/09/22/9a09228f98151d4795341c358d566869.jpg";
    }

    else if(month==11 && date>=22 || month==12 && date<=21){
        zodiac="Sagittarius";
        image="https://i.pinimg.com/736x/f8/5d/35/f85d358d512f547b8dacb9c964b5fb39.jpg";
    }

    else if(month==12 && date>=22 || month==1 && date<=19){
        zodiac="Capricorn";
        image="https://i.pinimg.com/736x/9c/0a/07/9c0a0794b114b7c6b02143b5e90baf9a.jpg";
    }

    else if(month==1 && date>=20 || month==2 && date<=18){
        zodiac="Aquarius";
        image="https://i.pinimg.com/736x/b8/c8/bd/b8c8bdb60f13ee68accf85b52a57d0cf.jpg";
    }

    else if(month==2 && date>=19 || month==3 && date<=20){
        zodiac="Pisces";
        image="https://i.pinimg.com/736x/3b/f3/0c/3bf30c90281ab3adae791c428ff716af.jpg";
    }

    else{
        zodiac="Invalid Date";
        image="";
    }

    document.getElementById("result").innerHTML="<h2>Your Zodiac Sign is : "+zodiac+"</h2>";

    if(image!=""){
        document.getElementById("zodiacImage").src=image;
        document.getElementById("zodiacImage").style.display="block";
    }
    else{
        document.getElementById("zodiacImage").style.display="none";
    }

}

</script>

</body>
</html>
