<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Astrology Zodiac Finder</title>
    <link rel="stylesheet" href="astrology.css">
</head>
<body>

<div class="container">
    <h1>🌟 Zodiac Sign Finder 🌟</h1>

    

<button onclick="findZodiac()">Find Zodiac</button>

    <div id="result"></div>

    <img id="zodiacImage" src="" alt="">
</div>

<script>

function findZodiac(){

    let date = parseInt(prompt("Enter Date (1-31):"));
    let month = prompt("Enter Month (January-December):").toLowerCase();

    let zodiac = "";
    let image = "";

    if((month=="march" && date>=21) || (month=="april" && date<=19)){
        zodiac="Aries";
        image="https://i.pinimg.com/736x/21/25/33/2125331ccd9caff209889a3a6e01921a.jpg";
    }

    else if((month=="april" && date>=20) || (month=="may" && date<=20)){
        zodiac="Taurus";
        image="https://i.pinimg.com/736x/41/65/1c/41651cf7ff554685b34ebc58c2b39674.jpg";
    }

    else if((month=="may" && date>=21) || (month=="june" && date<=20)){
        zodiac="Gemini";
        image="https://i.pinimg.com/1200x/17/67/64/17676489f60481a4644c10646b03c614.jpg";
    }

    else if((month=="june" && date>=21) || (month=="july" && date<=22)){
        zodiac="Cancer";
        image="https://i.pinimg.com/736x/5f/c2/e2/5fc2e2956fa888807abd0463327ceb29.jpg";
    }

    else if((month=="july" && date>=23) || (month=="august" && date<=22)){
        zodiac="Leo";
        image="https://i.pinimg.com/736x/1c/91/e2/1c91e2428b1dc5f94efd338dadadbf71.jpg";
    }

    else if((month=="august" && date>=23) || (month=="september" && date<=22)){
        zodiac="Virgo";
        image="https://i.pinimg.com/736x/14/00/cf/1400cf13d86b3ad9fb8069bbcddb92a0.jpg";
    }

    else if((month=="september" && date>=23) || (month=="october" && date<=22)){
        zodiac="Libra";
        image="https://i.pinimg.com/736x/25/69/d1/2569d1c7a2d9e04744fb1ff5832911e6.jpg";
    }

    else if((month=="october" && date>=23) || (month=="november" && date<=21)){
        zodiac="Scorpio";
        image="https://i.pinimg.com/736x/9a/09/22/9a09228f98151d4795341c358d566869.jpg";
    }

    else if((month=="november" && date>=22) || (month=="december" && date<=21)){
        zodiac="Sagittarius";
        image="https://i.pinimg.com/736x/f8/5d/35/f85d358d512f547b8dacb9c964b5fb39.jpg";
    }

    else if((month=="december" && date>=22) || (month=="january" && date<=19)){
        zodiac="Capricorn";
        image="https://i.pinimg.com/736x/9c/0a/07/9c0a0794b114b7c6b02143b5e90baf9a.jpg";
    }

    else if((month=="january" && date>=20) || (month=="february" && date<=18)){
        zodiac="Aquarius";
        image="https://i.pinimg.com/736x/b8/c8/bd/b8c8bdb60f13ee68accf85b52a57d0cf.jpg";
    }

    else if((month=="february" && date>=19) || (month=="march" && date<=20)){
        zodiac="Pisces";
        image="https://i.pinimg.com/736x/3b/f3/0c/3bf30c90281ab3adae791c428ff716af.jpg";
    }

    else{
        zodiac="Invalid Date or Month";
        image="";
    }

    document.getElementById("result").innerHTML =
    "<h2>Your Zodiac Sign is: " + zodiac + "</h2>";

    if(image!=""){
        document.getElementById("zodiacImage").src=image;
        document.getElementById("zodiacImage").style.display="block";
    }
    else{
        document.getElementById("zodiacImage").style.display="none";
    }
}

findZodiac();

</script>
    

</body>
</html>
